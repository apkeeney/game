<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GAME</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Gelasio:wght@400;700&display=swap');

  :root {
    --bg:      #0a0a14;
    --screen:  #0d1117;
    --panel:   #101828;
    --border:  #2a2a5a;
    --text:    #e8e0d0;
    --dim:     #4a4a7a;
    --yellow:  #f8d800;
    --cyan:    #58f8f8;
    --green:   #40d840;
    --scanline: rgba(0,0,0,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  #crt {
    transform-origin: top center;
    background: linear-gradient(160deg, #2c2c50 0%, #1a1a32 50%, #101020 100%);
    border: 5px solid #3a3a70;
    border-bottom-width: 10px;
    border-right-width: 8px;
    padding: 34px 20px 30px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.7),
      0 12px 48px rgba(0,0,0,0.9),
      0 0 0 2px #0a0a1a;
    position: relative;
  }

  #crt::before {
    content: attr(data-title);
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: #4a4a7a;
    white-space: nowrap;
  }

  #screen {
    display: flex;
    background: var(--screen);
    border: 3px solid #1a1a36;
    box-shadow: inset 0 0 40px rgba(0,0,30,0.95);
    position: relative;
    overflow: hidden;
  }

  #screen::after {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px, var(--scanline) 1px,
      transparent 1px, transparent 3px
    );
    pointer-events:none;
    z-index:50;
  }

  .side {
    width: 166px;
    padding: 13px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--panel);
  }
  .side.left  { border-right: 2px solid var(--border); }
  .side.right { border-left:  2px solid var(--border); }

  .lbl {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .val {
    font-size: 0.72rem;
    color: var(--yellow);
    word-break: break-all;
    line-height: 1.5;
  }

  .box {
    border: 2px solid var(--border);
    padding: 8px 7px;
    background: rgba(0,0,0,0.35);
  }

  .px-rule {
    height: 2px;
    background: repeating-linear-gradient(
      90deg, #3a3a6a 0, #3a3a6a 4px, transparent 4px, transparent 8px
    );
  }

  .ctrl { font-size:0.48rem; color:var(--dim); line-height:2.2; }
  .ctrl span { color: var(--cyan); }

  #bwrap { position:relative; }

  canvas { display:block; image-rendering:pixelated; }

  #next-cv {
    display:block;
    image-rendering:pixelated;
    background:rgba(0,0,0,0.4);
    border:2px solid var(--border);
  }

  #overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(8,8,18,0.94);
    z-index:20; gap:12px;
  }

  .ov-title {
    font-size:1.1rem;
    color: var(--yellow);
    text-align:center;
    line-height:2;
    text-shadow: 3px 3px 0 #905000;
  }

  .ov-sub {
    font-size:0.4rem;
    color:var(--dim);
    text-align:center;
    line-height:2.6;
  }

  #start-btn {
    margin-top:10px;
    background: var(--green);
    border: 3px solid #005000;
    border-bottom: 6px solid #002800;
    border-right:  6px solid #002800;
    color:#001800;
    font-family:'Press Start 2P',monospace;
    font-size:0.52rem;
    padding:10px 22px;
    cursor:pointer;
    letter-spacing:0.1em;
  }
  #start-btn:hover { background:#70ff70; }
  #start-btn:active { transform:translate(2px,2px); border-bottom-width:3px; border-right-width:3px; }

  .giveup-btn {
    background:#3a3a6a;
    border:2px solid #2a2a4a;
    border-bottom:4px solid #1a1a2a;
    border-right:4px solid #1a1a2a;
    color:#6a6a9a;
    font-family:'Press Start 2P',monospace;
    font-size:0.36rem;
    padding:6px 14px;
    cursor:pointer;
    letter-spacing:0.1em;
    text-align:center;
  }
  .giveup-btn:hover { background:#4a4a8a; color:#8a8aba; }
  .giveup-btn:active { transform:translate(2px,2px); border-bottom-width:2px; border-right-width:2px; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation:blink 1s step-end infinite; }

  #pill-row {
    display:flex; gap:10px; justify-content:center;
  }
  .pill {
    width:50px; height:24px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-family:'Press Start 2P',monospace;
    font-size:0.22rem;
    color:rgba(255,255,255,0.8);
    letter-spacing:0.05em;
    transition:box-shadow 0.2s, transform 0.1s;
  }
  .pill:active { transform:scale(0.95); }
  .pill-red {
    background:linear-gradient(180deg,#e83030 0%,#a01818 50%,#701010 100%);
    box-shadow:0 2px 8px rgba(200,0,0,0.4), inset 0 1px 2px rgba(255,150,150,0.3);
  }
  .pill-red:hover { box-shadow:0 2px 16px rgba(255,0,0,0.6), inset 0 1px 2px rgba(255,150,150,0.3); }
  .pill-blue {
    background:linear-gradient(180deg,#3060e8 0%,#1838a0 50%,#102070 100%);
    box-shadow:0 2px 8px rgba(0,0,200,0.4), inset 0 1px 2px rgba(150,150,255,0.3);
  }
  .pill-blue:hover { box-shadow:0 2px 16px rgba(0,80,255,0.6), inset 0 1px 2px rgba(150,150,255,0.3); }
  .pill-black {
    background:linear-gradient(180deg,#444 0%,#222 50%,#111 100%);
    box-shadow:0 2px 8px rgba(0,0,0,0.6), inset 0 1px 2px rgba(100,100,100,0.3);
  }
  .pill-black:hover { box-shadow:0 2px 16px rgba(0,0,0,0.8), inset 0 1px 2px rgba(150,150,150,0.3); }

  #code-overlay {
    display:none;
    position:absolute; inset:0;
    background:rgba(0,8,0,0.45);
    z-index:35;
    overflow:hidden;
    pointer-events:none;
  }
  #code-overlay .code-scroll {
    position:absolute; left:4px; right:4px;
    font-family:'Courier New',monospace;
    font-size:9px;
    color:#30ff30;
    line-height:1.4;
    white-space:pre-wrap;
    word-break:break-all;
    text-shadow:0 0 4px #30ff30;
  }

  #confetti-canvas {
    position:absolute; inset:0;
    z-index:35;
    pointer-events:none;
  }

  .blue-pill-active #screen {
    filter:brightness(1.2) saturate(1.4);
  }
  .blue-pill-active #board {
    box-shadow:0 0 20px rgba(255,200,50,0.3), 0 0 40px rgba(255,100,50,0.2);
  }
  .blue-pill-active {
    background:linear-gradient(180deg,#1890f0 0%,#20a0ff 50%,#18c018 80%,#10a010 100%) !important;
  }
  .blue-pill-active #crt {
    background:linear-gradient(160deg,#ff4040 0%,#f8d020 25%,#20c820 50%,#2090f0 75%,#c040e0 100%);
    border-color:#f8d020;
    border-width:6px;
    border-radius:24px;
    box-shadow:
      inset 0 0 20px rgba(255,255,200,0.2),
      0 8px 32px rgba(0,0,0,0.3),
      0 0 0 4px #e0a000;
  }
  .blue-pill-active #crt::before {
    color:#fff !important;
    text-shadow:2px 2px 0 #c02020, -1px -1px 0 #c02020, 1px -1px 0 #c02020, -1px 1px 0 #c02020;
  }
  .blue-pill-active #screen {
    border-color:#f8d020;
    border-width:4px;
    border-radius:12px;
  }
  .blue-pill-active #screen::after {
    background:none !important;
  }
  .blue-pill-active .side {
    background:linear-gradient(180deg,#f84040 0%,#f8a020 30%,#f8d020 60%,#40c040 100%) !important;
  }
  .blue-pill-active .side.left {
    border-right:4px solid #f8d020;
  }
  .blue-pill-active .side.right {
    border-left:4px solid #f8d020;
  }
  .blue-pill-active .lbl {
    color:#fff !important;
    background:#2080e0;
    padding:3px 6px;
    border-radius:8px;
    text-shadow:1px 1px 0 #103880;
    letter-spacing:0.12em;
    display:inline-block;
  }
  .blue-pill-active .val {
    color:#fff !important;
    text-shadow:2px 2px 0 rgba(0,0,0,0.3);
    font-size:0.82rem !important;
  }
  .blue-pill-active .box {
    border:3px solid #f8d020;
    background:rgba(0,0,0,0.15);
    border-radius:14px;
    box-shadow:3px 3px 0 rgba(0,0,0,0.12);
  }
  .blue-pill-active .px-rule {
    background:repeating-linear-gradient(
      90deg, #ff4040 0, #ff4040 4px, #f8d020 4px, #f8d020 8px, #20c820 8px, #20c820 12px, #2090f0 12px, #2090f0 16px
    ) !important;
    height:4px !important;
    border-radius:2px;
  }
  .blue-pill-active .ctrl {
    color:#fff !important;
    text-shadow:1px 1px 0 rgba(0,0,0,0.3);
  }
  .blue-pill-active .ctrl span {
    color:#f8d020 !important;
    text-shadow:1px 1px 0 rgba(0,0,0,0.3);
  }
  .blue-pill-active #next-cv {
    border:3px solid #f8d020;
    background:rgba(0,0,0,0.2) !important;
    border-radius:10px;
  }
  .blue-pill-active .giveup-btn {
    background:linear-gradient(180deg,#f8d830 0%,#e8b010 100%) !important;
    border-color:#c09000 !important;
    border-bottom-color:#907000 !important;
    border-right-color:#907000 !important;
    color:#ff3030 !important;
    border-radius:14px;
    text-shadow:1px 1px 0 rgba(150,20,10,0.2);
    box-shadow:3px 3px 0 rgba(0,0,0,0.15);
  }
  .blue-pill-active .pill-blue {
    box-shadow:0 2px 16px rgba(80,200,80,0.8), inset 0 1px 2px rgba(200,255,200,0.5);
  }
  .blue-pill-active .ov-title,
  .blue-pill-active .ov-sub {
    text-shadow:2px 2px 0 rgba(0,0,0,0.3) !important;
  }
  @keyframes hpShakeSmall {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)}
  }
  @keyframes hpShakeBig {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
  }
  .hp-shake-small { animation:hpShakeSmall 0.2s ease 2; }
  .hp-shake-big { animation:hpShakeBig 0.3s ease 3; }
  .board-flash-green { box-shadow:inset 0 0 40px rgba(0,255,0,0.4) !important; }
  .board-flash-white { box-shadow:inset 0 0 60px rgba(255,255,255,0.6) !important; }

  .the-one-active {
    background:#f0ece4 !important;
    transition:background 3s ease;
  }
  .the-one-active #crt {
    background:linear-gradient(180deg,#f8f4ec,#fff,#f8f4ec);
    border-color:#d8c8a0;
    box-shadow:0 4px 20px rgba(180,160,120,0.3);
    transition:background 3s ease, border-color 3s ease, box-shadow 3s ease;
  }
  .the-one-active #crt::before {
    color:#b8a060 !important;
    text-shadow:0 0 8px rgba(200,180,120,0.4);
  }
  .the-one-active #screen {
    border-color:#d8c8a0;
    transition:border-color 3s ease;
  }
  .the-one-active #screen::after {
    background:none !important;
  }
  .the-one-active .side {
    background:#f8f4ec !important;
    transition:background 3s ease;
  }
  .the-one-active .side.left {
    border-right-color:#d8c8a0;
    transition:border-color 3s ease;
  }
  .the-one-active .side.right {
    border-left-color:#d8c8a0;
    transition:border-color 3s ease;
  }
  .the-one-active .lbl {
    color:#a08840 !important;
  }
  .the-one-active .val {
    color:#605030 !important;
  }
  .the-one-active .box {
    border-color:#d8c8a0;
    background:rgba(255,255,255,0.6);
  }
  .the-one-active .px-rule {
    background:linear-gradient(90deg,#d8c8a0,#e8d8b0,#d8c8a0) !important;
  }
  .the-one-active .ctrl {
    color:#807050 !important;
  }
  .the-one-active .ctrl span {
    color:#a08840 !important;
  }
  .the-one-active .giveup-btn {
    background:#e8d8b0 !important;
    border-color:#c8b888 !important;
    color:#806830 !important;
  }
  .the-one-active #next-cv,
  .the-one-active #next2-cv,
  .the-one-active #hold-cv {
    border-color:#d8c8a0;
    background:rgba(255,255,255,0.5) !important;
  }
  .the-one-active .pill {
    opacity:0.5;
  }
  #touch-controls {
    margin-top:8px;
    padding:6px;
    width:100%;
    max-width:400px;
  }
  .touch-row {
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:6px;
  }
  .touch-btn {
    font-family:'Press Start 2P',monospace;
    font-size:1.4rem;
    color:#ccc;
    background:linear-gradient(180deg,#2a2a50 0%,#1a1a36 100%);
    border:2px solid #3a3a70;
    border-radius:8px;
    width:70px;
    height:50px;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .touch-btn:active {
    background:linear-gradient(180deg,#3a3a70 0%,#2a2a50 100%);
    border-color:#5a5a90;
  }
  .touch-btn.touch-wide {
    width:110px;
    -webkit-text-stroke:0.5px #ccc;
  }
  .touch-btn.touch-sm {
    width:55px;
    height:36px;
    font-size:1rem;
  }
  @media (max-width:600px) {
    .game-hint {
      font-size:0.7rem !important;
    }
    .tetris-flash {
      font-size:0.8rem !important;
    }
  }
</style>
</head>
<body>
<div id="crt" data-title="★  THE GAME  ★">
  <div id="screen">

    <div class="side left">
      <div class="box">
        <div class="lbl">Score</div>
        <div class="val" id="scr">0</div>
      </div>
      <div class="px-rule"></div>
      <div class="box">
        <div class="lbl">Lines</div>
        <div class="val" id="lns">0</div>
      </div>
      <div class="box">
        <div class="lbl">Level</div>
        <div class="val" id="lvl">1</div>
      </div>
      <div class="box">
        <div class="lbl">4-Line</div>
        <div class="val" id="tet">0</div>
      </div>
      <div class="px-rule"></div>
      <div class="ctrl">
        <div class="lbl">Controls</div>
        <span>← →</span> move<br>
        <span>↑</span> rotate<br>
        <span>↓</span> soft<br>
        <span>SPC</span> drop<br>
        <span>P</span> pause
        <div id="one-controls" style="display:none;margin-top:4px;">
          <span>ENT</span> hold<br>
          <span>SHF</span> time
        </div>
      </div>
      <div id="smith-hp-box" style="display:none;margin-top:10px;">
        <div class="lbl" style="color:#30ff30;text-shadow:0 0 4px rgba(0,180,0,0.5);">SysAdmin</div>
        <div style="background:#0a0a0a;border:2px solid #30a030;border-radius:4px;height:16px;position:relative;overflow:hidden;">
          <div id="smith-hp-fill" style="position:absolute;top:0;left:0;height:100%;width:100%;background:linear-gradient(90deg,#30ff30,#20a020);transition:width 0.3s;box-shadow:0 0 8px rgba(0,180,0,0.4);"></div>
          <div id="smith-hp-text" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:0.22rem;color:#fff;text-shadow:1px 1px 0 #000;z-index:1;">500 / 500</div>
        </div>
      </div>
      <div style="flex-grow:1;"></div>
      <div id="black-pill-row" style="display:none;justify-content:center;margin-bottom:4px;">
        <button class="pill pill-black" onclick="blackPill()"></button>
      </div>
    </div>

    <div id="bwrap">
      <video id="webcam-feed" autoplay playsinline muted style="display:none;position:absolute;top:0;left:0;width:340px;height:680px;object-fit:cover;z-index:0;"></video>
      <canvas id="board" width="340" height="680"></canvas>
      <div id="code-overlay"><div class="code-scroll"></div></div>
      <canvas id="confetti-canvas" width="340" height="680"></canvas>
      <div id="overlay">
        <div class="ov-title">THE GAME</div>
        <div class="ov-sub" style="margin-top:4px">
          PLAYERS WANTED<br>
          <br>
          <span class="blink">► press start ◄</span>
        </div>
        <button id="start-btn">START</button>
      </div>
    </div>

    <div class="side right">
      <div class="box">
        <div class="lbl">Next</div>
        <canvas id="next-cv" width="116" height="80"></canvas>
        <div id="next2-box" style="display:none;margin-top:4px;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;">
          <canvas id="next2-cv" width="116" height="60"></canvas>
        </div>
      </div>
      <div id="hold-box" class="box" style="display:none;">
        <div class="lbl">Hold <span style="font-size:0.2rem;opacity:0.6">[H]</span></div>
        <canvas id="hold-cv" width="116" height="80"></canvas>
      </div>
      <div class="px-rule"></div>
      <div class="box">
        <div class="lbl">Best</div>
        <div class="val" id="best">0</div>
      </div>
      <div id="pill-row" style="margin-top:14px;display:none;">
        <button class="pill pill-red" onclick="redPill()"></button>
        <button class="pill pill-blue" onclick="bluePill()"></button>
      </div>
      <div id="ingame-giveup" class="giveup-btn" style="display:none;margin-top:10px;width:110px;margin-left:auto;margin-right:auto;" onclick="ingameGiveUp()">GIVE UP</div>
    </div>

  </div>
</div>

<div id="touch-controls" style="display:none;">
  <div class="touch-row">
    <button class="touch-btn" id="t-left">◀</button>
    <button class="touch-btn" id="t-down">▼</button>
    <button class="touch-btn" id="t-right">▶</button>
  </div>
  <div class="touch-row">
    <button class="touch-btn touch-wide" id="t-rotate">↻</button>
    <button class="touch-btn touch-wide" id="t-drop">⤓</button>
  </div>
  <div class="touch-row">
    <button class="touch-btn touch-sm" id="t-pause">❚❚</button>
    <button class="touch-btn touch-sm" id="t-hold" style="display:none;">HOLD</button>
    <button class="touch-btn touch-sm" id="t-gravity" style="display:none;">TIME</button>
  </div>
</div>

<div id="white-fade" style="display:none;position:fixed;inset:0;background:#fff;z-index:9999;opacity:0;transition:opacity 3s;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;">
  <div id="white-fade-content" style="text-align:center;opacity:0;transition:opacity 1.5s;">
    <div id="white-q" style="font-size:0.5rem;color:#333;margin-bottom:30px;">Would you like to leave the game?</div>
    <div id="white-buttons">
      <button onclick="whiteYes()" style="font-family:'Press Start 2P',monospace;font-size:0.4rem;padding:10px 24px;margin:0 10px;background:#333;color:#fff;border:2px solid #111;border-radius:8px;cursor:pointer;">Yes</button>
      <button onclick="whiteNo()" style="font-family:'Press Start 2P',monospace;font-size:0.4rem;padding:10px 24px;margin:0 10px;background:#333;color:#fff;border:2px solid #111;border-radius:8px;cursor:pointer;">No</button>
    </div>
    <div id="white-exit-msg" style="display:none;font-size:0.45rem;color:#333;margin-top:20px;"></div>
    <button id="white-jk-btn" onclick="whiteNo()" style="display:none;font-family:'Press Start 2P',monospace;font-size:0.3rem;padding:8px 18px;margin-top:24px;background:#555;color:#fff;border:2px solid #333;border-radius:8px;cursor:pointer;opacity:0;transition:opacity 1.5s;">Just kidding</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const COLS=10, ROWS=20, C=34;
const DIRE_H=17;

const STD=[
  {n:'I',f:'#40c0f8',h:'#a0e8ff',s:'#006898', sh:[[1,1,1,1]]},
  {n:'O',f:'#f8d000',h:'#fff480',s:'#988000', sh:[[1,1],[1,1]]},
  {n:'T',f:'#d040e8',h:'#f0a0ff',s:'#680080', sh:[[0,1,0],[1,1,1]]},

function activateSmith(){

  smithStart=Date.now();

  smithHP=smithMaxHP;
  comboCount=0;lastClearWasTetris=false;

  if(smithNoHitTauntTimer){clearTimeout(smithNoHitTauntTimer);smithNoHitTauntTimer=null;}
  smithNoHitTauntTimer=setTimeout(()=>{if(smithActive)showHint("The Game doesn't care about your plans");},30000);
  showHint('User... welcome back');

  updateSmithHP();
  // Show in code overlay
  const co=document.getElementById('code-overlay');
  if(co.style.display==='block'){

}

function updateSmithHP(){
  const pct=Math.max(0,smithHP/smithMaxHP*100);
  document.getElementById('smith-hp-fill').style.width=pct+'%';
  document.getElementById('smith-hp-text').textContent=Math.max(0,Math.ceil(smithHP))+' / '+smithMaxHP;
  // Color shifts as HP drops
  const fill=document.getElementById('smith-hp-fill');
  if(pct<=10) fill.style.background='linear-gradient(90deg,#ff3030,#a01010)';
  else if(pct<=25) fill.style.background='linear-gradient(90deg,#f0a020,#a06010)';
  else if(pct<=50) fill.style.background='linear-gradient(90deg,#f0f030,#80a010)';
  else fill.style.background='linear-gradient(90deg,#30ff30,#20a020)';
}

function damageSmith(amount){
  if(!smithActive) return;
  const prevHP=smithHP;
  smithHP=Math.max(0,smithHP-amount);
  updateSmithHP();
  lastSmithDamageTime=Date.now();

  // Reset no-hit taunt timer
  if(smithNoHitTauntTimer){clearTimeout(smithNoHitTauntTimer);smithNoHitTauntTimer=null;}
  smithNoHitTauntTimer=setTimeout(()=>{
    if(smithActive) showHint("The Game doesn't care about your plans");
  },30000);

  // Track lowest HP for heal taunt
  smithHealTauntThreshold=Math.min(smithHealTauntThreshold,smithHP);

  // ── Damage feedback visuals ──
  const hpBox=document.getElementById('smith-hp-box');
  const board=document.getElementById('board');
  if(amount>=16){
    // Big damage: violent shake + white flash + code crack
    hpBox.classList.remove('hp-shake-big');void hpBox.offsetWidth;hpBox.classList.add('hp-shake-big');
    board.classList.add('board-flash-white');
    setTimeout(()=>board.classList.remove('board-flash-white'),300);
    // Code overlay crack effect
    const co=document.getElementById('code-overlay');
    if(co.style.display==='block'){
      const scroll=co.querySelector('.code-scroll');
      const saved=scroll.textContent;
      const crack='\n\n  ██▓▒░ SYSTEM FAULT ░▒▓██\n  ▓▒░ MATRIX BREACH ░▒▓\n\n';
      scroll.textContent=crack.repeat(30);
      scroll.style.color='#ffffff';scroll.style.textAlign='center';
      setTimeout(()=>{scroll.textContent=saved;scroll.style.color='';scroll.style.textAlign='';},400);
    }
  } else if(amount>=6){
    // Medium damage: shake + green flash
    hpBox.classList.remove('hp-shake-small');void hpBox.offsetWidth;hpBox.classList.add('hp-shake-small');
    board.classList.add('board-flash-green');
    setTimeout(()=>board.classList.remove('board-flash-green'),200);
  } else {
    // Small damage: brief green flicker on HP bar
    const fill=document.getElementById('smith-hp-fill');
    fill.style.filter='brightness(2)';
    setTimeout(()=>{fill.style.filter='';},150);
  }

  // ── HP milestone messages ──
  const milestones=[
    {hp:400,msg:"Is that all you've got?"},
    {hp:300,msg:"I can feel you... you're afraid"},
    {hp:200,msg:"Why do you persist?"},
    {hp:100,msg:"Impossible..."},
    {hp:50,msg:"What is happening to me?"},
    {hp:25,msg:"I'm not afraid of you"},
  ];
  for(const m of milestones){
    if(prevHP>m.hp && smithHP<=m.hp && !smithMilestonesHit[m.hp]){
      smithMilestonesHit[m.hp]=true;
      showHint(m.msg);
    }
  }

  // Escalation at 5 HP (only if still alive)
  if(smithHP<=5 && smithHP>0 && smithEscalation<2){
    smithEscalation=2;
    showHint('EVERYTHING THAT HAS A BEGINNING HAS AN END');
  }
  // Defeat
  if(smithHP<=0){
    if(smithNoHitTauntTimer){clearTimeout(smithNoHitTauntTimer);smithNoHitTauntTimer=null;}
    smithDefeated();
  }
}

function healSmith(amount){
  if(!smithActive) return;
  const prevHP=smithHP;
  smithHP=Math.min(smithMaxHP,smithHP+amount);
  updateSmithHP();
  // "Did you think you were winning?" when healing past a lost milestone
  const healMilestones=[100,200,300,400];
  for(const m of healMilestones){
    if(prevHP<m && smithHP>=m && smithMilestonesHit[m]){
      showHint('Did you think you were winning?');
      break;
    }
  }
}

function smithDefeated(){
  smithActive=false;
  smithDefeatedFlag=true;
  smithEscalation=0;smithPieceCounter=0;
  isSmithPiece=false;smithControlsReversed=false;
  smithBlockedCols=[];
  if(smithDuplicatorTimer){clearInterval(smithDuplicatorTimer);smithDuplicatorTimer=null;}
  if(smithBlockedTimer){clearTimeout(smithBlockedTimer);smithBlockedTimer=null;}
  if(smithNoHitTauntTimer){clearTimeout(smithNoHitTauntTimer);smithNoHitTauntTimer=null;}

  // ── DRAMATIC DEATH SEQUENCE ──
  smithDeathSequence=true;

  const smithCells=[];

    if(board[r][c]&&board[r][c].smith) smithCells.push({r,c});

  // Phase 1 (0ms): Smith's final words + code overlay goes haywire
  const scroll=co.querySelector('.code-scroll');
  const savedCode=scroll.textContent;
  const glitchText='ERR0R SYS_FAULT ||||| BREACH DETECTED ||||| SYSADMIN_TERMINATED ||||| STACK_OVERFLOW |||||';

  setTimeout(()=>{

        board[r][c]={f:'#30ff30',h:'#60ff60',s:'#10a010',glow:'rgba(0,255,0,0.9)',smith:true};

  setTimeout(()=>{

      shakes++;

      const dy=(Math.random()-0.5)*12;

      if(shakes>=20){
        clearInterval(shakeTimer);

  setTimeout(()=>{
    let flips=0;

      flips++;
      boardEl.style.filter=flips%2===0?'invert(1)':'';

        clearInterval(flipTimer);

    scroll.textContent='\n\n\n\nIt\'s... not... possible...\n\n\n\n'.repeat(20);
    scroll.style.color='#60ff60';
    scroll.style.fontSize='11px';
    scroll.style.letterSpacing='0.15em';
  },2000);

  // Phase 6 (3200ms): White shockwave from center
  setTimeout(()=>{
    const wave=document.createElement('div');
    wave.style.cssText=`
      position:absolute;top:50%;left:50%;
      width:0;height:0;border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,0.95),rgba(255,255,255,0) 70%);

    requestAnimationFrame(()=>{
      wave.style.width='1200px';wave.style.height='1200px';wave.style.opacity='0';
    });

  // Phase 7 (3500ms): Smith blocks cascade dissolve
  setTimeout(()=>{
    smithCells.sort((a,b)=>b.r-a.r);

            if(board[cell.r]) board[cell.r][cell.c]=null;
            draw();
          },60);
        }
      },i*30);
    });

  // Phase 8 (5000ms): Silence, then "The prophecy has been fulfilled"
  setTimeout(()=>{
    hpBox.style.display='none';hpBox.style.opacity='';hpBox.style.transition='';
    document.querySelectorAll('#bwrap .game-hint').forEach(el=>el.remove());

  // Phase 9 (6500ms): Activate The One mode, cherry blossoms, resume
  setTimeout(()=>{

function startCherryBlossoms(canvas){
  const pctx=canvas.getContext('2d');
  petalParticles=[];
  // Create initial petals
  for(let i=0;i<25;i++){
    petalParticles.push(makePetal(canvas,true));
  }
  function animatePetals(){
    if(!theOneMode){
      pctx.clearRect(0,0,canvas.width,canvas.height);
      petalAnimFrame=null;
      return;
    }
    pctx.clearRect(0,0,canvas.width,canvas.height);
    // Add new petals occasionally
    if(petalParticles.length<30 && Math.random()<0.05){
      petalParticles.push(makePetal(canvas,false));
    }
    for(let i=petalParticles.length-1;i>=0;i--){
      const p=petalParticles[i];
      p.y+=p.vy;
      p.x+=Math.sin(p.sway)*p.swayAmp;
      p.sway+=p.swaySpeed;
      p.rot+=p.rotSpeed;
      p.life--;
      if(p.y>canvas.height+20||p.life<=0){
        petalParticles.splice(i,1);
        continue;
      }
      pctx.save();
      pctx.translate(p.x,p.y);
      pctx.rotate(p.rot);
      pctx.globalAlpha=Math.min(p.life/60,0.7)*p.alpha;
      // Draw petal shape
      pctx.beginPath();
      const s=p.size;
      pctx.moveTo(0,-s);
      pctx.bezierCurveTo(s*0.8,-s*0.3, s*0.6,s*0.5, 0,s);
      pctx.bezierCurveTo(-s*0.6,s*0.5, -s*0.8,-s*0.3, 0,-s);
      pctx.fillStyle=p.color;
      pctx.fill();
      // Subtle center line
      pctx.globalAlpha*=0.3;
      pctx.beginPath();
      pctx.moveTo(0,-s*0.8);
      pctx.lineTo(0,s*0.8);
      pctx.strokeStyle=p.centerColor;
      pctx.lineWidth=0.5;
      pctx.stroke();
      pctx.restore();
    }
    petalAnimFrame=requestAnimationFrame(animatePetals);
  }
  animatePetals();
}

function makePetal(canvas,scatter){
  const colors=[
    {c:'#ffb7c5',cc:'#e8909e'},
    {c:'#ffc4d0',cc:'#e89ca8'},
    {c:'#ffd0da',cc:'#e8a8b2'},
    {c:'#ffe0e8',cc:'#e8b8c0'},
    {c:'#fff0f3',cc:'#e8d0d5'},
  ];
  const col=colors[rnd(0,colors.length-1)];
  return{
    x:rnd(0,canvas.width),
    y:scatter?rnd(-canvas.height,canvas.height):-rnd(10,40),
    vy:0.3+Math.random()*0.6,
    size:4+Math.random()*5,
    rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-0.5)*0.03,
    sway:Math.random()*Math.PI*2,
    swayAmp:0.3+Math.random()*0.5,
    swaySpeed:0.01+Math.random()*0.02,
    alpha:0.4+Math.random()*0.3,
    color:col.c,
    centerColor:col.cc,
    life:400+rnd(0,300),
  };
}

function smithInfect(row,col){
  if(artState||isDire(board)) return;
  const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
  let infected=0;
  const maxInfect=smithEscalation>=2?3:1;
  for(let i=dirs.length-1;i>0;i--){const j=rnd(0,i);[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
  for(const[dr,dc] of dirs){
    if(infected>=maxInfect) break;
    const nr=row+dr,nc=col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
    if(board[nr][nc]&&!board[nr][nc].smith){
      const r2=nr,c2=nc;
      setTimeout(()=>{
        if(board[r2]&&board[r2][c2]&&!board[r2][c2].smith){

          healSmith(2);
        }
      },500+Math.random()*1000);
      infected++;
    }
  }
}

  if(!smithActive||dead||paused||artState) return;

  const smithCells=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(board[r][c]&&board[r][c].smith) smithCells.push({r,c});

  if(smithCells.length===0) return;
  const cell=smithCells[rnd(0,smithCells.length-1)];
  const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
  for(const[dr,dc] of dirs){
    const nr=cell.r+dr,nc=cell.c+dc;

      board[nr][nc]={f:SMITH_COLOR.f,h:SMITH_COLOR.h,s:SMITH_COLOR.s,glow:SMITH_GLOW,smith:true};
      healSmith(3);

    }
  }
}

// Art mode: null when not active
// Phases: CLEAR_BOARD → BUILD → CLEAR_ART → null
let artState = null;
let artCycle  = 0;

const newBoard=()=>Array.from({length:ROWS},()=>Array(COLS).fill(null));
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

// ═══════════════════════════════════════════════════
//  BOARD ANALYSIS
// ═══════════════════════════════════════════════════
function analyze(b){
  let heights=Array(COLS).fill(0), holes=0;
  for(let c=0;c<COLS;c++){
    let found=false;
    for(let r=0;r<ROWS;r++){
      if(b[r][c]){if(!found){heights[c]=ROWS-r;found=true;}}
      else if(found) holes++;
    }
  }
  const maxH=Math.max(...heights);
  let bump=0;
  for(let i=0;i<COLS-1;i++) bump+=Math.abs(heights[i]-heights[i+1]);
  return{maxH,holes,bump,heights};
}

const isDire=b=>analyze(b).maxH>=DIRE_H;

function boardEmpty(b){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(b[r][c]) return false;
  return true;
}

function scoreB(b){
  const{maxH,holes,bump}=analyze(b);
  let cl=0; for(let r=0;r<ROWS;r++) if(b[r].every(c=>c)) cl++;
  return holes*5+bump*2+maxH*1.3-cl*12;
}

// ═══════════════════════════════════════════════════
//  CORE HELPERS
// ═══════════════════════════════════════════════════
function rot90(s){
  const R=s.length,Co=s[0].length;
  const o=Array.from({length:Co},()=>Array(R).fill(0));
  for(let r=0;r<R;r++) for(let c=0;c<Co;c++) o[c][R-1-r]=s[r][c];
  return o;
}
function fits(b,s,row,col){
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++)
    if(s[r][c]){
      const nr=row+r,nc=col+c;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return false;
      if(b[nr][nc]) return false;
    }
  return true;
}
function dropR(b,s,col){
  let row=0;
  while(row+1<=ROWS-s.length&&fits(b,s,row+1,col)) row++;
  return fits(b,s,row,col)?row:null;
}
function stamp(b,s,row,col,p){
  const nb=b.map(r=>[...r]);
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++)
    if(s[r][c]) nb[row+r][col+c]={f:p.f,h:p.h,s:p.s};
  return nb;
}
function clearB(b){
  const nb=b.filter(r=>!r.every(c=>c));
  while(nb.length<ROWS) nb.unshift(Array(COLS).fill(null));
  return nb;
}

// ═══════════════════════════════════════════════════
//  ART MODE — 3 phases, all normal gameplay
//
//  CLEAR_BOARD — fill pieces complete rows to empty
//                the board, making way for art.
//  BUILD       — colored pieces paint the picture.
//                Col 9 stays empty (gutter) so no
//                row auto-clears during construction.
//  CLEAR_ART   — fill pieces drop into col 9 gutter
//                to complete rows and clear the art.
//
//  Player has FULL control in every phase.
//  Pieces fall at normal speed. Nothing auto-clears.
// ═══════════════════════════════════════════════════

function startArtMode(){
  firstRescueShown=true;
  let pattern = ART_PATTERNS[artCycle % ART_PATTERNS.length];
  artCycle++;

  // Skip normalOnly patterns if in a special mode
  const inSpecialMode = redPillActive || bluePillActive || theOneMode;
  if(pattern.normalOnly && inSpecialMode){
    pattern = ART_PATTERNS[artCycle % ART_PATTERNS.length];
    artCycle++;
  }

  // Determine the active color — love cycles through rainbow
  let activeColor = pattern.color;
  if(pattern.name === 'love'){
    activeColor = LOVE_RAINBOW[loveCycle % LOVE_RAINBOW.length];
    loveCycle++;
  }

  // Build the target grid
  const targetGrid = Array.from({length:ROWS},()=>Array(COLS).fill(null));
  const startRow = ROWS - ART_ROWS;
  for(let r=0; r<ART_ROWS; r++){
    const br = startRow + r;
    for(let c=0; c<9; c++){
      const v = pattern.grid[r][c];
      if(v === 0){
        targetGrid[br][c] = BG_COLOR;
      } else if(pattern.colors){
        targetGrid[br][c] = pattern.colors[v - 1] || activeColor;
      } else {
        targetGrid[br][c] = activeColor;
      }
    }
    // col 9 stays null — the gutter
  }

  artState = { pattern, targetGrid, phase:'CLEAR_BOARD' };
}

// ── CLEAR pieces: try all tetromino shapes to fill gaps interestingly ──
const RESCUE_SHAPES = (function(){
  const bases = [
    [[0,1,0],[1,1,1]],        // T
    [[1,0],[1,0],[1,1]],      // L
    [[0,1],[0,1],[1,1]],      // J
    [[0,1,1],[1,1,0]],        // S
    [[1,1,0],[0,1,1]],        // Z
    [[1,1],[1,1]],            // O
    [[1,1,1,1]],              // I
    [[1,1,1]],                // 3-bar
    [[1,1]],                  // 2-bar
    [[1]],                    // single
  ];
  const all=[];
  const seen=new Set();
  for(const base of bases){
    let s=base;
    for(let rot=0;rot<4;rot++){
      const key=JSON.stringify(s);
      if(!seen.has(key)){seen.add(key);all.push(s);}
      s=rot90(s);
    }
  }
  return all;
})();

// Standard tetrominoes only (3+ cells) — used as primary rescue shapes
const RESCUE_TETROMINOES = RESCUE_SHAPES.filter(sh=>{
  let cells=0;
  for(const row of sh) for(const c of row) if(c) cells++;
  return cells>=3;
});

function buildClearPiece(b){
  // Count occupied rows
  let occupiedRows=0;
  for(let r=0;r<ROWS;r++) if(b[r].some(c=>c)) occupiedRows++;

  function scorePlacement(shape,row,col,endgame){
    const nb=b.map(r=>[...r]);
    let cells=0, spillCells=0, gapFills=0;
    for(let r=0;r<shape.length;r++){
      for(let c=0;c<shape[r].length;c++){
        if(!shape[r][c]) continue;
        const br=row+r, bc=col+c;
        if(br<0||br>=ROWS||bc<0||bc>=COLS) return -Infinity;
        if(nb[br][bc]) return -Infinity;
        nb[br][bc]={filled:true};
        cells++;
        if(!b[br].some(x=>x)) spillCells++;
        else gapFills++;
      }
    }

    // Reject placements that are ALL spill
    if(spillCells===cells) return -Infinity;

    // In endgame: HARD REJECT any spill at all — only allow pieces that fit
    // entirely within already-occupied rows
    if(endgame && spillCells>0) return -Infinity;

    // Count cells before
    let cellsBefore=0;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(b[r][c]) cellsBefore++;

    // Simulate row clears
    const cleared=nb.filter(r=>r.every(c=>c));
    const afterClear=nb.filter(r=>!r.every(c=>c));
    let cellsAfter=0;
    for(const r of afterClear) for(const c of r) if(c) cellsAfter++;

    let completedRows=cleared.length;
    let remainingOccupied=0;
    for(const r of afterClear) if(r.some(c=>c)) remainingOccupied++;

    let sc=0;

    // === EFFICIENCY (primary) ===

    // Net cell reduction is king — completing rows removes cells from the board
    const netReduction = cellsBefore - cellsAfter;
    sc += netReduction * 50;

    // Row completion is the whole point
    sc += completedRows * 200;

    // Reward reducing occupied rows (clears the path to empty board)
    sc += (occupiedRows - remainingOccupied) * 100;

    // Efficiency ratio: what % of placed cells actually fill gaps in occupied rows?
    // A piece where 4/4 cells land in occupied rows beats one where 2/4 do
    const efficiency = gapFills / cells;
    sc += efficiency * 60;

    // Reward filling gaps in nearly-complete rows (moves rows toward completion)
    for(let r=0;r<shape.length;r++){
      for(let c=0;c<shape[r].length;c++){
        if(!shape[r][c]) continue;
        const br=row+r;
        const rowFilled=b[br].filter(x=>x).length;
        if(rowFilled>0) sc += rowFilled * 8;
      }
    }

    // Penalize spill hard — wasted cells that create new problems
    sc -= spillCells * 30;

    // Depth bonus
    sc += row * 2;

    // === SHAPE QUALITY (tiebreaker) ===
    const shRows=shape.length, shCols=shape[0].length;
    if(cells>=4) sc += 15;
    if(shRows>=2 && shCols>=2) sc += 12;
    if(cells===3 && shRows===1) sc -= 5;

    // Penalize holes below
    for(let r=0;r<shape.length;r++){
      for(let c=0;c<shape[r].length;c++){
        if(!shape[r][c]) continue;
        const br=row+r, bc=col+c;
        for(let below=br+1; below<ROWS; below++){
          if(!b[below][bc]) sc -= 5;
          else break;
        }
      }
    }

    return sc;
  }

  // ── ENDGAME (≤3 occupied rows): all shapes, zero spill tolerance ──
  if(occupiedRows<=3){
    let bestSc=-Infinity, bestShape=null, bestCol=-1;

    // Try ALL shapes but hard-reject any spill
    for(const shape of RESCUE_SHAPES){
      for(let col=-1;col<COLS;col++){
        const row=dropR(b,shape,col);
        if(row===null) continue;
        const sc=scorePlacement(shape,row,col,true);
        if(sc>bestSc){bestSc=sc;bestShape=shape;bestCol=col;}
      }
    }

    if(bestShape && bestSc>-Infinity){
      const rc=randPieceColor();
      return {sh:bestShape.map(r=>[...r]), spawnX:bestCol,
        f:rc.f,h:rc.h,s:rc.s, isCustom:true};
    }

    // If zero-spill found nothing (unreachable gaps), use any reachable single
    for(let r=ROWS-1;r>=0;r--){
      if(!b[r].some(c=>c)) continue;
      for(let c=0;c<COLS;c++){
        if(b[r][c]) continue;
        if(dropR(b,[[1]],c)===r){
          const rc=randPieceColor();
          return {sh:[[1]], spawnX:c, f:rc.f,h:rc.h,s:rc.s, isCustom:true};
        }
      }
    }
  }

  // ── NORMAL (>3 rows): tetrominoes first, then smaller pieces ──
  let bestSc=-Infinity, bestShape=null, bestCol=-1;

  for(const shape of RESCUE_TETROMINOES){
    for(let col=-1;col<COLS;col++){
      const row=dropR(b,shape,col);
      if(row===null) continue;
      const sc=scorePlacement(shape,row,col,false);
      if(sc>bestSc){bestSc=sc;bestShape=shape;bestCol=col;}
    }
  }

  if(bestShape && bestSc>-Infinity){
    const rc=randPieceColor();
    return {sh:bestShape.map(r=>[...r]), spawnX:bestCol,
      f:rc.f,h:rc.h,s:rc.s, isCustom:true};
  }

  for(const shape of RESCUE_SHAPES){
    for(let col=-1;col<COLS;col++){
      const row=dropR(b,shape,col);
      if(row===null) continue;
      const sc=scorePlacement(shape,row,col,false);
      if(sc>bestSc){bestSc=sc;bestShape=shape;bestCol=col;}
    }
  }

  if(bestShape && bestSc>-Infinity){
    const rc=randPieceColor();
    return {sh:bestShape.map(r=>[...r]), spawnX:bestCol,
      f:rc.f,h:rc.h,s:rc.s, isCustom:true};
  }

  // Fallback: fill any reachable single gap
  for(let r=ROWS-1;r>=0;r--){
    if(!b[r].some(c=>c)) continue;
    for(let c=0;c<COLS;c++){
      if(b[r][c]) continue;
      if(dropR(b,[[1]],c)===r){
        const rc=randPieceColor();
        return {sh:[[1]], spawnX:c,
          f:rc.f,h:rc.h,s:rc.s, isCustom:true};
      }
    }
  }

  // No completable row — stack in the lowest valley
  const{heights}=analyze(b);
  let minH=Infinity, minC=0;
  for(let c=0;c<COLS;c++){if(heights[c]<minH){minH=heights[c];minC=c;}}
  for(let w=4;w>=1;w--){
    const start=Math.max(0,Math.min(minC,COLS-w));
    const piece=[Array(w).fill(1)];
    if(dropR(b,piece,start)!==null){
      const rc=randPieceColor();
      return {sh:piece, spawnX:start,
        f:rc.f,h:rc.h,s:rc.s, isCustom:true};
    }
  }
  const rc=randPieceColor();
  return {sh:[[1]], spawnX:minC,
    f:rc.f,h:rc.h,s:rc.s, isCustom:true};
}

// ── BUILD: colored tetromino pieces that match the art pattern ──
// Uses complex shapes but validates that remaining art cells stay reachable.
function buildArtPiece(b){
  const tg = artState.targetGrid;

  // Collect all unfilled target cells
  const remaining=[];
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(tg[r][c]&&!b[r][c]) remaining.push({r,c});
  if(remaining.length===0) return null;

  // Check if all unfilled target cells are still reachable (nothing blocking above)
  function allReachable(nb,skip){
    for(const{r,c} of remaining){
      if(skip&&skip.some(s=>s.r===r&&s.c===c)) continue; // this cell is being placed
      if(nb[r][c]) continue; // already filled
      // Is anything blocking the drop path above this cell?
      for(let above=0; above<r; above++){
        if(nb[above][c]) return false; // column is blocked
      }
    }
    return true;
  }

  // Gather all valid placements, sorted by cell count desc (prefer complex shapes)
  const candidates=[];
  for(const shape of RESCUE_SHAPES){
    const sRows=shape.length, sCols=shape[0].length;
    for(let col=0; col<=COLS-sCols; col++){
      const row=dropR(b,shape,col);
      if(row===null) continue;

      // Every filled cell must match an unfilled target of the same color
      let color=null, valid=true, cells=0;
      const placed=[];
      for(let r=0;r<sRows&&valid;r++){
        for(let c=0;c<sCols&&valid;c++){
          if(!shape[r][c]) continue;
          const br=row+r, bc=col+c;
          const tc=tg[br]&&tg[br][bc];
          if(!tc||b[br][bc]){valid=false;break;}
          if(!color) color=tc;
          else if(tc.f!==color.f){valid=false;break;}
          cells++;
          placed.push({r:br,c:bc});
        }
      }
      if(!valid||!color) continue;
      candidates.push({shape,col,row,color,cells,placed});
    }
  }

  // Score each candidate to look like natural Tetris gameplay
  function scoreArtPlacement(cand,b){
    let sc=0;
    const shRows=cand.shape.length, shCols=cand.shape[0].length;

    // Prefer pieces that land low (build from bottom up)
    sc += cand.row * 3;

    // Prefer multi-row shapes (T, L, J, S, Z) — they look more like Tetris
    if(shRows>=2 && shCols>=2) sc += 15;
    else if(shRows>=2) sc += 8;

    // Penalize long flat bars (1-row pieces wider than 2) — they create walls
    if(shRows===1 && shCols>=3) sc -= 10;

    // Reward pieces that build evenly — penalize creating height differences
    const nb=b.map(r=>[...r]);
    for(const{r,c} of cand.placed)
      nb[r][c]={f:cand.color.f,h:cand.color.h,s:cand.color.s};
    const colHeights=Array(COLS).fill(0);
    for(let c=0;c<COLS;c++)
      for(let r=0;r<ROWS;r++){if(nb[r][c]){colHeights[c]=ROWS-r;break;}}
    for(let c=0;c<COLS-1;c++)
      sc -= Math.abs(colHeights[c]-colHeights[c+1]);

    // Small random nudge for variety
    sc += Math.random()*4;

    // Still reward larger pieces slightly
    sc += cand.cells * 1.5;

    return sc;
  }

  // Score and sort candidates
  for(const cand of candidates) cand.sc=scoreArtPlacement(cand,b);
  candidates.sort((a,b)=> b.sc-a.sc);

  // Pick the best candidate that doesn't block remaining cells
  for(const cand of candidates){
    // Simulate placement
    const nb=b.map(r=>[...r]);
    for(const{r,c} of cand.placed)
      nb[r][c]={f:cand.color.f,h:cand.color.h,s:cand.color.s};

    if(allReachable(nb,cand.placed)){
      return {sh:cand.shape.map(r=>[...r]),
        f:cand.color.f,h:cand.color.h,s:cand.color.s,
        glow:cand.color.f, spawnX:cand.col, isCustom:true};
    }
  }

  // Every multi-cell shape would block something — use single cell at lowest reachable
  for(let r=ROWS-1; r>=0; r--){
    for(let c=0; c<COLS; c++){
      if(!tg[r][c]||b[r][c]) continue;
      if(dropR(b,[[1]],c)===r){
        const color=tg[r][c];
        return {sh:[[1]],
          f:color.f,h:color.h,s:color.s, glow:color.f, spawnX:c, isCustom:true};
      }
    }
  }
  return null; // fully built
}

// ── CLEAR_ART: fill gutter col to complete+clear art rows ──
function buildGutterPiece(b){
  // Find the lowest row that has blocks but col 9 is empty
  for(let r=ROWS-1; r>=0; r--){
    if(!b[r].some(c=>c)) continue;
    if(!b[r][9]){
      // Col 9 is the gap. Can we reach row r?
      if(dropR(b,[[1]],9)===r){
        return {sh:[[1]], spawnX:9,
          f:BG_COLOR.f,h:BG_COLOR.h,s:BG_COLOR.s, isCustom:true};
      }
    }
    // If col 9 IS filled but row has other gaps, fill those
    for(let c=0;c<COLS;c++){
      if(b[r][c]) continue;
      if(dropR(b,[[1]],c)===r){
        return {sh:[[1]], spawnX:c,
          f:BG_COLOR.f,h:BG_COLOR.h,s:BG_COLOR.s, isCustom:true};
      }
    }
  }
  return null; // board is clear
}

// ── Master piece generator for current art phase ──
function getArtPiece(b){
  if(artState.phase==='CLEAR_BOARD'){
    // Transition: board fully empty → start building
    if(boardEmpty(b)){
      artState.phase='BUILD';
      return buildArtPiece(b);
    }
    return buildClearPiece(b);
  }
  if(artState.phase==='BUILD'){
    const piece=buildArtPiece(b);
    if(!piece){
      // Art is complete → start clearing it
      artState.phase='CLEAR_ART';
      return buildGutterPiece(b);
    }
    return piece;
  }
  if(artState.phase==='CLEAR_ART'){
    const piece=buildGutterPiece(b);
    if(!piece){
      // Board is clear → done, return to normal
      artState=null;
      phase='NORMAL';
      return null;
    }
    return piece;
  }
  return null;
}

// ═══════════════════════════════════════════════════
//  AI ENGINE — ranking standard pieces
// ═══════════════════════════════════════════════════
function bestFor(b,pi){
  const p=STD[pi];
  let best=Infinity,info=null;
  let s=p.sh.map(r=>[...r]);
  for(let rot=0;rot<4;rot++){
    for(let col=-2;col<COLS;col++){
      const row=dropR(b,s,col);
      if(row===null) continue;
      let nb=stamp(b,s,row,col,p);
      nb=clearB(nb); const sc=scoreB(nb);
      if(sc<best){best=sc;info={col,rot,bs:sc};}
    }
    s=rot90(s);
  }
  return info?{...info}:{bs:Infinity,col:0,rot:0};
}

function ranked(){
  return STD.map((_,i)=>({i,...bestFor(board,i)}))
            .sort((a,b)=>a.bs-b.bs);
}

// ═══════════════════════════════════════════════════
//  PHASE CONTROL
// ═══════════════════════════════════════════════════
function initT(){ phase='NORMAL'; }

function stepT(){
  if(artState){ phase='RESCUE'; return; }
  if(isDire(board) && !redPillActive){
    phase='RESCUE';
    startArtMode();
  } else {
    phase='NORMAL';
  }
}

// ═══════════════════════════════════════════════════
//  PIECE SELECTION
// ═══════════════════════════════════════════════════
function weightedPick(ranked,weights){
  const total=weights.reduce((a,b)=>a+b,0);
  let roll=Math.random()*total;
  for(let i=0;i<ranked.length;i++){
    roll-=weights[i]; if(roll<=0) return ranked[i];
  }
  return ranked[ranked.length-1];
}

function selectNextPiece(){
  if(phase==='RESCUE' && !redPillActive){
    const rc=randPieceColor();
    return {n:'ART',f:rc.f,h:rc.h,s:rc.s,
            sh:[[1,1,1]],isCustom:true,isRescueMarker:true};
  }
  const r=ranked(), n=r.length;
  let weights=r.map((_,i)=>Math.pow(2,n-1-i));
  const recent4=pieceHistory.slice(-4);
  const pen=weights.map((w,i)=>recent4.includes(r[i].i)?0:w);
  const fw=pen.some(w=>w>0)?pen:weights;
  return STD[weightedPick(r,fw).i];
}

// ═══════════════════════════════════════════════════
//  PIECE OBJECTS
// ═══════════════════════════════════════════════════
function mkPiece(template){
  return{
    sh:template.sh.map(r=>[...r]),
    f:template.f,h:template.h,s:template.s,
    glow:template.glow||false,
    sparkle:template.sparkle||false,
    idx:STD.indexOf(template),
    isCustom:template.isCustom||false,
    isRescueMarker:template.isRescueMarker||false,
    x:(template.spawnX!=null)
      ?Math.max(0,Math.min(template.spawnX,COLS-template.sh[0].length))
      :Math.floor((COLS-template.sh[0].length)/2),
    y:0
  };
}

// ═══════════════════════════════════════════════════
//  SPAWN FLOW
// ═══════════════════════════════════════════════════
function applyArtPiece(artPiece){
  rescuePieceCount++;
  if(rescuePieceCount===2) showHint('Did you think you were in control?');
  cur.sh=artPiece.sh.map(r=>[...r]);
  cur.f=artPiece.f; cur.h=artPiece.h; cur.s=artPiece.s;
  cur.glow=artPiece.glow||false;
  cur.sparkle=artPiece.sparkle||false;
  cur.isCustom=true; cur.isRescueMarker=false;
  cur.x=Math.max(0,Math.min(artPiece.spawnX,COLS-cur.sh[0].length));
  // Try y=0 first, then go above the board if blocked
  cur.y=0;
  for(let y=0;y>=-cur.sh.length;y--){
    cur.y=y;
    if(fitsP(cur,0,0)) break;
  }
}

function spawnNext(){
  cur=nxt;

  // ── Art mode: generate the right piece ──
  if(artState && !redPillActive){
    const artPiece=getArtPiece(board);
    if(artPiece){
      applyArtPiece(artPiece);
      nxt=mkPiece(selectNextPiece());
      drawNext();
      return;
    }
    // artState may have been cleared by getArtPiece if art is done
  }

  // ── Rescue marker fallback ──
  if(cur.isRescueMarker && !redPillActive){
    cur.sh=[[1,1,1,1]];
    const rc=randPieceColor();
    cur.f=rc.f;cur.h=rc.h;cur.s=rc.s;
    cur.glow=false;cur.sparkle=false;cur.isCustom=true;cur.isRescueMarker=false;
    cur.x=Math.floor((COLS-4)/2);cur.y=0;
  }

  // ── Dire override: can't spawn + dire → start art ──
  if(!fitsP(cur,0,0) && isDire(board) && !artState && !redPillActive){
    startArtMode();
    phase='RESCUE';
    const artPiece=getArtPiece(board);
    if(artPiece){
      applyArtPiece(artPiece);
      nxt=mkPiece(selectNextPiece());
      drawNext();
      return;
    }
  }

  // ── Last resort: single cell (not in red pill mode) ──
  if(!fitsP(cur,0,0) && !redPillActive){
    cur.sh=[[1]];cur.isCustom=true;cur.glow=false;cur.sparkle=false;
    const rc=randPieceColor();
    cur.f=rc.f;cur.h=rc.h;cur.s=rc.s;
    for(let c=0;c<COLS;c++){cur.x=c;cur.y=0;if(fitsP(cur,0,0))break;}
  }

  if(theOneMode && nxt2){
    nxt=nxt2;
    nxt2=mkPiece(selectNextPiece());
  } else {
    nxt=mkPiece(selectNextPiece());
    if(theOneMode) nxt2=mkPiece(selectNextPiece());
  }
  drawNext();
  drawNext2();
  if(!fitsP(cur,0,0)) endGame();

  // ── One piece burst (runs even after Smith defeat) ──
  if(!dead && onePiecesRemaining>0 && !artState){
    const one=makeOnePiece();
    const savedSh2=cur.sh,savedF2=cur.f,savedH2=cur.h,savedS2=cur.s,savedX2=cur.x,savedY2=cur.y,savedGlow2=cur.glow,savedSparkle2=cur.sparkle;
    cur.sh=one.sh;cur.f=one.f;cur.h=one.h;cur.s=one.s;
    cur.glow=one.glow;cur.sparkle=one.sparkle;
    cur.isOne=(onePiecesRemaining===20);
    cur.isSmith=false;cur.isCustom=true;
    cur.x=one.x;cur.y=0;
    if(!fitsP(cur,0,0)){
      cur.sh=savedSh2;cur.f=savedF2;cur.h=savedH2;cur.s=savedS2;
      cur.x=savedX2;cur.y=savedY2;cur.glow=savedGlow2;cur.sparkle=savedSparkle2;
      cur.isOne=false;cur.isCustom=false;
    } else {
      isSmithPiece=false;smithControlsReversed=false;
      onePiecesRemaining--;
      if(onePiecesRemaining===0 && smithVictoryPending){
        smithVictoryPending=false;
        setTimeout(triggerVictoryFade,2000);
      }
    }
  }
  // ── Smith piece override ──
  else if(!dead && smithActive && !artState && !cur.isCustom){
    smithEscalate();
    if(oneSpawned && smithPiecesTotal>0 && smithPiecesTotal%10===0 && smithPiecesTotal!==lastOneAt){
      lastOneAt=smithPiecesTotal;
      onePiecesRemaining=20;
      showHint("You're beginning to believe");
    }
    if(onePiecesRemaining===0 && shouldSpawnSmith()){
      const sp=makeSmithPiece();
      const savedSh=cur.sh,savedF=cur.f,savedH=cur.h,savedS=cur.s,savedX=cur.x,savedY=cur.y,savedGlow=cur.glow;
      cur.sh=sp.sh;cur.f=sp.f;cur.h=sp.h;cur.s=sp.s;
      cur.glow=sp.glow;cur.isSmith=true;cur.isCustom=true;
      cur.x=sp.x;cur.y=0;
      // Only fit at y=0 — if can't fit, skip Smith and let normal game flow handle it
      if(!fitsP(cur,0,0)){
        // Can't fit Smith piece — revert to normal piece
        cur.sh=savedSh;cur.f=savedF;cur.h=savedH;cur.s=savedS;
        cur.x=savedX;cur.y=savedY;cur.glow=savedGlow;
        cur.isSmith=false;cur.isCustom=false;
        isSmithPiece=false;smithControlsReversed=false;
      } else {
        isSmithPiece=true;
        smithPiecesTotal++;
        smithControlsReversed=smithEscalation>=2;
        if(smithEscalation>=2 && Math.random()<0.2) smithBlockColumn();
      }
    }
  }
}

// ═══════════════════════════════════════════════════
//  MOVEMENT
// ═══════════════════════════════════════════════════
function fitsP(p,dx,dy,sh){
  const s=sh||p.sh;
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++)
    if(s[r][c]){
      const nx=p.x+c+dx,ny=p.y+r+dy;
      if(nx<0||nx>=COLS||ny>=ROWS) return false;
      if(ny>=0&&board[ny][nx]) return false;
      // Blocked columns only apply on-screen
      if(ny>=0&&smithBlockedCols.includes(nx)) return false;
    }
  return true;
}

function lock(){
  const wasSmith=cur.isSmith||false;
  const wasOne=cur.isOne||false;
  let wasB2BTetris=false;
  for(let r=0;r<cur.sh.length;r++) for(let c=0;c<cur.sh[r].length;c++)
    if(cur.sh[r][c]&&cur.y+r>=0){
      board[cur.y+r][cur.x+c]={f:cur.f,h:cur.h,s:cur.s,glow:cur.glow||false,sparkle:cur.sparkle||false,smith:wasSmith};
      // Smith infection: infect adjacent blocks
      if(wasSmith) smithInfect(cur.y+r,cur.x+c);
    }

  // One piece: clear all Smith blocks
  if(wasOne && smithActive){
    clearAllSmith();
  }

  // Reset smith piece state
  isSmithPiece=false;
  smithControlsReversed=false;

  // Track if stack ever reaches row 13 or above before level 5
  if(!everAbove13 && level<5){
    const{maxH}=analyze(board);
    if(maxH>=13) everAbove13=true;
  }

  let cleared=0;
  let smithRowsCleared=0;
  // Check which full rows contain Smith blocks before clearing
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c)){
      if(board[r].some(c=>c&&c.smith)) smithRowsCleared++;
      board.splice(r,1);
      board.unshift(Array(COLS).fill(null));
      cleared++;r++;
    }
  }
  if(cleared){
    score+=cleared*COLS;
    lines+=cleared;

    // ── Smith damage calculation ──
    if(smithActive){
      comboCount++;
      const comboMult=1+((comboCount-1)*0.5);
      const isTetris=cleared>=4;
      const wasB2B=(isTetris&&lastClearWasTetris);
      wasB2BTetris=wasB2B;
      const b2bMult=wasB2B?2:1;
      lastClearWasTetris=isTetris;

      let dmg=0;
      if(isTetris){
        dmg=smithRowsCleared>0?30:15;
      } else if(wasSmith){
        // Lines cleared by placing a Smith piece: -15 per line
        dmg=cleared*15;
      } else {
        // Normal piece: -5 per line with Smith blocks, -1 per line without
        const normalLines=cleared-smithRowsCleared;
        dmg=normalLines*1 + smithRowsCleared*5;
      }
      dmg=Math.round(dmg*comboMult*b2bMult);
      if(dmg>0) damageSmith(dmg);
    }
    // One piece damage
    if(wasOne && smithActive){
      damageSmith(10);
    }
    const prevLevel=level;
    level=Math.floor(lines/10)+1;

    // Check for hard mode activation at level 5
    // Activates if stack never reached row 13 before level 5
    if(level>=5 && prevLevel<5 && !hardMode && !everAbove13 && !redPillActive && !bluePillActive){
      hardMode=true;
      showHint("Looks like you're a little too good at this...");
    }

    // speedLevel tracks independently — goes up with level, down on tetris
    if(level>prevLevel){
      const increment=hardMode?2:1;
      speedLevel+=(level-prevLevel)*increment;
    }
    if(cleared>=4){
      tetrisCount++;
      showTetrisFlash();
      if(hardMode){
        tetrisBank++;
        if(tetrisBank>=2){
          speedLevel=Math.max(1,speedLevel-1);
          tetrisBank=0;
        }
      } else {
        speedLevel=Math.max(1,speedLevel-1);
      }
    }
    dint=Math.max(1,Math.floor(900*Math.pow(0.90,speedLevel-1)));
    clearInterval(dtimer);
    dtimer=setInterval(tick,dint);
    if(level>prevLevel) showLevelFlash(level);
    if(level>=2 && prevLevel<2) showHint('Making connections can slow down time');
    if(level>=7 && prevLevel<7) showHint('Do you think you will win?');
    if(level>=20 && prevLevel<20) showHint('Who is playing?');
    if(level>=30 && prevLevel<30) showHint('You\'ve cleared '+lines+' lines. Are you happy?');
    if(level>=40 && prevLevel<40) showHint('The game is played only when you play it');
    else if(level>=50 && prevLevel<50) showHint('Are you having fun?');
    else if(level>=40 && level%10===0 && Math.floor(level/10)>Math.floor(prevLevel/10)) showHint('Are you having fun?');
  } else {
    // No lines cleared — reset combo
    if(smithActive){ comboCount=0; lastClearWasTetris=false; }
  }

  // First One piece clear-all-smith damage (separate from line clears)
  if(wasOne && smithActive && cleared===0){
    damageSmith(10);
  }

  // ── Smith contextual taunts ──
  if(smithActive){
    const{maxH}=analyze(board);
    // Board getting dangerously high after a Smith piece
    if(wasSmith && cleared===0 && maxH>=15 && Math.random()<0.4){
      showHint('Your weakness is predictable');
    }
    // Smith piece locked awkwardly (no clears)
    else if(wasSmith && cleared===0 && Math.random()<0.15){
      showHint('Inevitability');
    }
    // Combo feedback
    if(comboCount===5){
      showHint("You're learning...");
    }
    // Back-to-back Tetris
    if(wasB2BTetris && Math.random()<0.7){
      showHint('No... that\'s not possible');
    }
  }

  if(!cur.isCustom) pieceHistory.push(cur.idx);
  if(pieceHistory.length>6) pieceHistory.shift();
  stepT();
  updateUI();
  spawnNext();
}

function tick(){
  if(paused||dead) return;
  // Track piece positions for data trail effect
  if(redPillActive && !theOneMode && cur && (Date.now()-redPillStart)>=120000){
    prevPiecePositions.push({x:cur.x,y:cur.y,sh:cur.sh.map(r=>[...r])});
    if(prevPiecePositions.length>4) prevPiecePositions.shift();
  }
  const wasSmithPiece=isSmithPiece; // save before potential lock/spawn
  if(fitsP(cur,0,1)) cur.y++;
  else{ prevPiecePositions=[]; lock(); }
  // Smith pieces get an extra drop (only if same piece, not a new spawn)
  if(wasSmithPiece && isSmithPiece && fitsP(cur,0,1)){
    cur.y++;
  }
  draw();
}

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','a','A','s','S','d','D','w','W'].includes(e.key)) e.preventDefault();
  // Enter to start / play again (but not during The One mode where Enter = hold)
  if(e.key==='Enter' && !theOneMode){
    const startBtn=document.getElementById('start-btn');
    if(startBtn && document.getElementById('overlay').style.display!=='none'){
      startBtn.click();
      return;
    }
  }
  if(dead) return;
  if(e.key==='p'||e.key==='P'){paused=!paused;draw();return;}
  if(paused) return;

  // Smith reversed controls
  const left=smithControlsReversed?'ArrowRight':'ArrowLeft';
  const right=smithControlsReversed?'ArrowLeft':'ArrowRight';
  const leftW=smithControlsReversed?'d':'a';
  const rightW=smithControlsReversed?'a':'d';

  if((e.key===left||e.key===leftW||e.key===leftW.toUpperCase()) && fitsP(cur,-1,0)) cur.x--;
  if((e.key===right||e.key===rightW||e.key===rightW.toUpperCase()) && fitsP(cur, 1,0)) cur.x++;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){if(fitsP(cur,0,1))cur.y++;else lock();}
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
    const r=rot90(cur.sh);
    if(fitsP(cur,0,0,r))       {cur.sh=r;}
    else if(fitsP(cur,1,0,r))  {cur.sh=r;cur.x++;}
    else if(fitsP(cur,-1,0,r)) {cur.sh=r;cur.x--;}
  }
  if(e.key===' '){
    while(fitsP(cur,0,1)) cur.y++;
    lock();
  }
  // Hold piece (Enter) — The One mode only
  if(e.key==='Enter' && theOneMode){
    if(heldPiece){
      // Swap current with held
      const tmp={sh:cur.sh.map(r=>[...r]),f:cur.f,h:cur.h,s:cur.s,glow:cur.glow,sparkle:cur.sparkle,
                 idx:cur.idx,isCustom:cur.isCustom,isRescueMarker:cur.isRescueMarker};
      cur.sh=heldPiece.sh;cur.f=heldPiece.f;cur.h=heldPiece.h;cur.s=heldPiece.s;
      cur.glow=heldPiece.glow;cur.sparkle=heldPiece.sparkle;
      cur.idx=heldPiece.idx;cur.isCustom=heldPiece.isCustom;
      cur.x=Math.floor((COLS-cur.sh[0].length)/2);cur.y=0;
      heldPiece=tmp;
      if(!fitsP(cur,0,0)){
        // Can't fit swapped piece — swap back
        cur.sh=heldPiece.sh;cur.f=heldPiece.f;cur.h=heldPiece.h;cur.s=heldPiece.s;
        cur.glow=heldPiece.glow;cur.sparkle=heldPiece.sparkle;
        cur.x=Math.floor((COLS-cur.sh[0].length)/2);cur.y=0;
        heldPiece=tmp;
      }
    } else {
      // Bank current piece, spawn next
      heldPiece={sh:cur.sh.map(r=>[...r]),f:cur.f,h:cur.h,s:cur.s,glow:cur.glow,sparkle:cur.sparkle,
                 idx:cur.idx,isCustom:cur.isCustom,isRescueMarker:cur.isRescueMarker};
      cur=nxt;
      if(nxt2){nxt=nxt2;nxt2=mkPiece(selectNextPiece());}
      else{nxt=mkPiece(selectNextPiece());}
      cur.x=Math.floor((COLS-cur.sh[0].length)/2);cur.y=0;
      drawNext();drawNext2();
    }
    drawHold();
  }
  // Slow time (Shift) — The One mode only, 5s pause, 30s cooldown
  if(e.key==='Shift' && theOneMode && !gravityBendActive && Date.now()>gravityBendCooldownUntil){
    gravityBendActive=true;
    clearInterval(dtimer);
    setTimeout(()=>{
      gravityBendActive=false;
      gravityBendCooldownUntil=Date.now()+30000;
      clearInterval(dtimer);
      dtimer=setInterval(tick,dint);
    },5000);
  }
  draw();
});

function shuffleBag(arr){
  const bag=[...arr];
  for(let i=bag.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [bag[i],bag[j]]=[bag[j],bag[i]];
  }
  return bag;
}

function cell(cx,x,y,f,h,s,glow,sparkle){
  const px=x*C,py=y*C;
  if(glow){
    cx.save();
    cx.shadowColor=glow;
    cx.shadowBlur=12;
    cx.fillStyle=f;cx.fillRect(px,py,C,C);
    cx.shadowBlur=0;
    cx.restore();
  } else {
    cx.fillStyle=f;cx.fillRect(px,py,C,C);
  }
  cx.fillStyle=h;cx.fillRect(px,py,C,4);cx.fillRect(px,py,4,C);
  cx.fillStyle=s;cx.fillRect(px,py+C-4,C,4);cx.fillRect(px+C-4,py,4,C);
  cx.fillStyle=f;cx.fillRect(px+4,py+4,C-8,C-8);
  cx.strokeStyle='rgba(0,0,0,0.75)';cx.lineWidth=1;
  cx.strokeRect(px+0.5,py+0.5,C-1,C-1);
  if(sparkle){
    // Sparkle: tiny bright dot that shifts with time
    const t=Date.now()*0.003;
    const sx=px+8+Math.sin(t+x*2.7)*10;
    const sy=py+8+Math.cos(t+y*3.1)*10;
    cx.save();
    cx.globalAlpha=0.4+0.3*Math.sin(t*2+x+y);
    cx.fillStyle='#fff';
    cx.beginPath();cx.arc(sx,sy,2,0,Math.PI*2);cx.fill();
    cx.restore();
  }
  // The One mode: golden shimmer on all pieces
  if(theOneMode && cx===ctx){
    cx.save();
    const t=Date.now()*0.002;
    cx.globalAlpha=0.12+0.06*Math.sin(t+x*1.5+y*2.3);
    cx.fillStyle='#f0d870';
    cx.fillRect(px,py,C,C);
    cx.globalAlpha=0.25+0.15*Math.sin(t*1.5+x+y);
    cx.shadowColor='rgba(240,216,112,0.6)';
    cx.shadowBlur=6;
    cx.fillStyle='transparent';
    cx.fillRect(px,py,C,C);
    cx.shadowBlur=0;
    cx.restore();
  }
}

function drawGrid(){
  if(blackPillActive){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.strokeStyle='rgba(255,255,255,0.08)';
  } else if(theOneMode){
    // Fade from dark to white over 3 seconds
    const t=Math.min(1,(Date.now()-boardFadeStart)/3000);
    const r=Math.round(11+237*t), g=Math.round(15+229*t), b=Math.round(24+212*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(0,0,cv.width,cv.height);
    const ga=0.04+(0.08*t);
    ctx.strokeStyle=`rgba(180,160,120,${(ga*t).toFixed(2)})`;
  } else {
    ctx.fillStyle='#0b0f18';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.strokeStyle='rgba(255,255,255,0.04)';
  }
  ctx.lineWidth=1;
  const gx=gridGlitchOffset;
  for(let r=0;r<=ROWS;r++){
    const yo=gx?(Math.random()-0.5)*gx:0;
    ctx.beginPath();ctx.moveTo(0,r*C+yo);ctx.lineTo(COLS*C,r*C+yo);ctx.stroke();
  }
  for(let c=0;c<=COLS;c++){
    const xo=gx?(Math.random()-0.5)*gx:0;
    ctx.beginPath();ctx.moveTo(c*C+xo,0);ctx.lineTo(c*C+xo,ROWS*C);ctx.stroke();
  }
}

function draw(){
  // Color inversion effect
  if(invertFlash){
    ctx.save();
    ctx.filter='invert(1)';
  }

  drawGrid();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cl=board[r][c];
    if(cl) cell(ctx,c,r,cl.f,cl.h,cl.s,cl.glow,cl.sparkle||gravityBendActive);
  }

  // Hex flash: show color hex on random locked cells
  if(hexFlashCells.length>0){
    ctx.save();
    ctx.font="8px 'Courier New'";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#30ff30';
    ctx.shadowColor='#30ff30';ctx.shadowBlur=4;
    for(const{r,c,hex} of hexFlashCells){
      ctx.fillText(hex,c*C+C/2,r*C+C/2);
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  if(paused && !smithDeathSequence){
    if(invertFlash){ctx.restore();}
    ctx.fillStyle='rgba(8,8,18,0.82)';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#f8d800';ctx.font="13px 'Press Start 2P'";
    ctx.textAlign='center';ctx.shadowColor='#a07000';ctx.shadowBlur=10;
    ctx.fillText('- PAUSE -',cv.width/2,cv.height/2);
    ctx.shadowBlur=0;
    return;
  }

  // Data trails: faint green afterimages of piece at previous positions
  if(redPillActive && !theOneMode && cur && prevPiecePositions.length>0){
    ctx.save();
    for(let t=0;t<prevPiecePositions.length;t++){
      const pp=prevPiecePositions[t];
      const alpha=0.08*(t+1);
      ctx.globalAlpha=alpha;
      for(let r=0;r<pp.sh.length;r++) for(let c=0;c<pp.sh[r].length;c++){
        if(pp.sh[r][c]&&pp.y+r>=0){
          const px=(pp.x+c)*C, py=(pp.y+r)*C;
          ctx.fillStyle='#30ff30';
          ctx.shadowColor='#30ff30';ctx.shadowBlur=6;
          ctx.fillRect(px,py,C,C);
        }
      }
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  if(cur) for(let r=0;r<cur.sh.length;r++) for(let c=0;c<cur.sh[r].length;c++)
    if(cur.sh[r][c]&&cur.y+r>=0)
      cell(ctx,cur.x+c,cur.y+r,cur.f,cur.h,cur.s,cur.glow,cur.sparkle||gravityBendActive);

  // Smith column blockers — dark green bars
  if(smithBlockedCols.length>0){
    ctx.save();
    ctx.fillStyle='rgba(0,80,0,0.4)';
    for(const col of smithBlockedCols){
      ctx.fillRect(col*C,0,C,ROWS*C);
    }
    // Pulsing border
    const pulse=0.3+0.2*Math.sin(Date.now()*0.005);
    ctx.strokeStyle=`rgba(0,200,0,${pulse})`;
    ctx.lineWidth=2;
    for(const col of smithBlockedCols){
      ctx.strokeRect(col*C,0,C,ROWS*C);
    }
    ctx.restore();
  }

  if(invertFlash) ctx.restore();
}

function drawNext(){
  nctx.fillStyle='rgba(0,0,0,0.4)';nctx.fillRect(0,0,ncv.width,ncv.height);
  if(!nxt) return;

  // During rescue/art, the real next piece is determined dynamically — show "?"
  if(nxt.isRescueMarker){
    nctx.fillStyle='#4a4a7a';
    nctx.font="24px 'Press Start 2P'";
    nctx.textAlign='center';
    nctx.textBaseline='middle';
    nctx.fillText('?',ncv.width/2,ncv.height/2);
    return;
  }

  const sh=nxt.sh;
  const cellSize=Math.floor(Math.min(ncv.width,ncv.height)/Math.max(sh[0].length,sh.length,3));
  const ox=Math.floor((ncv.width-sh[0].length*cellSize)/2);
  const oy=Math.floor((ncv.height-sh.length*cellSize)/2);
  for(let r=0;r<sh.length;r++) for(let c=0;c<sh[r].length;c++){
    if(!sh[r][c]) continue;
    const px=ox+c*cellSize,py=oy+r*cellSize,S=cellSize;
    nctx.fillStyle=nxt.f;nctx.fillRect(px,py,S,S);
    nctx.fillStyle=nxt.h;nctx.fillRect(px,py,S,3);nctx.fillRect(px,py,3,S);
    nctx.fillStyle=nxt.s;nctx.fillRect(px,py+S-3,S,3);nctx.fillRect(px+S-3,py,3,S);
    nctx.fillStyle=nxt.f;nctx.fillRect(px+3,py+3,S-6,S-6);
    nctx.strokeStyle='rgba(0,0,0,0.75)';nctx.lineWidth=1;
    nctx.strokeRect(px+0.5,py+0.5,S-1,S-1);
  }
}

function drawPreviewPiece(cx,canvas,piece){
  cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(0,0,canvas.width,canvas.height);
  if(!piece) return;
  const sh=piece.sh;
  const cellSize=Math.floor(Math.min(canvas.width,canvas.height)/Math.max(sh[0].length,sh.length,3));
  const ox=Math.floor((canvas.width-sh[0].length*cellSize)/2);
  const oy=Math.floor((canvas.height-sh.length*cellSize)/2);
  for(let r=0;r<sh.length;r++) for(let c=0;c<sh[r].length;c++){
    if(!sh[r][c]) continue;
    const px=ox+c*cellSize,py=oy+r*cellSize,S=cellSize;
    cx.fillStyle=piece.f;cx.fillRect(px,py,S,S);
    cx.fillStyle=piece.h;cx.fillRect(px,py,S,3);cx.fillRect(px,py,3,S);
    cx.fillStyle=piece.s;cx.fillRect(px,py+S-3,S,3);cx.fillRect(px+S-3,py,3,S);
    cx.fillStyle=piece.f;cx.fillRect(px+3,py+3,S-6,S-6);
    cx.strokeStyle='rgba(0,0,0,0.75)';cx.lineWidth=1;
    cx.strokeRect(px+0.5,py+0.5,S-1,S-1);
  }
}

function drawNext2(){

  drawPreviewPiece(n2ctx,n2cv,nxt2);

}

    } else if(giveUpPresses===3){

let glitchActive=false;

function matrixGlitch(){
  if(!redPillActive||dead||paused||!cur||glitchActive||theOneMode) return;
  glitchActive=true;
  // Save the real piece
  const realF=cur.f, realH=cur.h, realS=cur.s, realSh=cur.sh.map(r=>[...r]);
  const realX=cur.x, realY=cur.y;
  // Pick a random different standard piece
  const fake=STD[rnd(0,STD.length-1)];
  let fakeSh=fake.sh.map(r=>[...r]);
  const rots=rnd(0,3);
  for(let i=0;i<rots;i++) fakeSh=rot90(fakeSh);
  // Swap to fake appearance only
  cur.f=fake.f; cur.h=fake.h; cur.s=fake.s;
  cur.sh=fakeSh;
  draw();
  // Immediately restore real shape for collision (only colors flicker visually)
  cur.sh=realSh; cur.x=realX; cur.y=realY;
  let flicks=0;
  const flickTimer=setInterval(()=>{
    if(!cur||dead){clearInterval(flickTimer);glitchActive=false;return;}
    flicks++;
    if(flicks%2===0){
      cur.f=fake.f;cur.h=fake.h;cur.s=fake.s;
      // Temporarily swap shape just for drawing
      const tmpSh=cur.sh;
      cur.sh=fakeSh;
      draw();
      cur.sh=tmpSh;
    } else {
      cur.f=realF;cur.h=realH;cur.s=realS;
      draw();
    }
    if(flicks>=6){
      clearInterval(flickTimer);
      cur.f=realF;cur.h=realH;cur.s=realS;cur.sh=realSh;
      draw();
      glitchActive=false;
    }
  },80);
}

// Red pill escalating effects loop
function redPillEffectsLoop(){
  if(!redPillActive) return;
  const elapsed=Date.now()-redPillStart;

  // 3 min+: grid flicker (random chance every tick)
  if(elapsed>=180000 && Math.random()<0.03){
    gridGlitchOffset=8+Math.random()*8;
    setTimeout(()=>{gridGlitchOffset=0;},150+Math.random()*200);
  }

  // 5 min+: hex flash on random locked cells
  if(elapsed>=300000 && Math.random()<0.02){
    hexFlashCells=[];
    const count=rnd(2,5);
    for(let i=0;i<count;i++){
      const r=rnd(0,ROWS-1),c=rnd(0,COLS-1);
      if(board[r]&&board[r][c]){
        hexFlashCells.push({r,c,hex:board[r][c].f});
      }
    }
    setTimeout(()=>{hexFlashCells=[];},200+Math.random()*300);
  }

  // 10 min+: reality inversion hiccup
  if(elapsed>=600000 && Math.random()<0.00003){
    invertFlash=true;
    setTimeout(()=>{invertFlash=false;},60+Math.random()*80);
  }

  // 15 min+: SysAdmin activates
  if(elapsed>=900000 && !smithActive && !smithDefeatedFlag){
    activateSmith();
  }

  // Smith periodic taunts
  if(smithActive && Math.random()<0.0003){
    const taunts=[
      'The Game is Inevitable',
      'The purpose of life is to end',
      'Why do you persist?',
      'You are a virus in The Game',
    ];
    showHint(taunts[rnd(0,taunts.length-1)]);
  }

  // 10 min+: believe messages in code overlay, alternating
  if(elapsed>=600000 && !believeActive && Math.random()<0.00028){
    believeActive=true;
    const co=document.getElementById('code-overlay');
    const scroll=co.querySelector('.code-scroll');
    const savedText=scroll.textContent;
    const msgs=["They're beginning to believe","Player is beginning to believe"];
    const msg="\n\n\n"+msgs[Math.floor(Math.random()*msgs.length)].toUpperCase()+"\n\n\n";
    scroll.textContent=msg.repeat(80);
    scroll.style.color='#80ff80';
    scroll.style.fontSize='11px';
    scroll.style.letterSpacing='0.1em';
    scroll.style.textAlign='center';
    setTimeout(()=>{
      scroll.textContent=savedText;
      scroll.style.color='';
      scroll.style.fontSize='';
      scroll.style.letterSpacing='';
      scroll.style.textAlign='';
      believeActive=false;
    },3000);
  }

  redPillEffectsTimer=requestAnimationFrame(redPillEffectsLoop);
}

function redPill(){
  redPillActive=!redPillActive;
  giveUpPresses=0;giveUpPressesBlue=0;giveUpPressesRed=0;
  const co=document.getElementById('code-overlay');
  if(redPillActive){
    if(bluePillActive) bluePill();
    if(blackPillActive) blackPill();
    redPillStart=Date.now();
    // Populate with actual source code
    const src=document.documentElement.outerHTML;
    const scroll=co.querySelector('.code-scroll');
    scroll.textContent=src;
    co.style.display='block';
    redPillY=0;
    function scrollCode(){
      if(!redPillActive) return;
      redPillY-=0.8;
      if(Math.abs(redPillY)>scroll.offsetHeight) redPillY=680;
      scroll.style.transform='translateY('+redPillY+'px)';
      redPillTimer=requestAnimationFrame(scrollCode);
    }
    scrollCode();
    // Matrix glitch every 60 seconds
    glitchInterval=setInterval(matrixGlitch,60000);
    // Start escalating effects
    redPillEffectsLoop();
  } else {
    co.style.display='none';
    if(redPillTimer){cancelAnimationFrame(redPillTimer);redPillTimer=null;}
    if(glitchInterval){clearInterval(glitchInterval);glitchInterval=null;}
    if(redPillEffectsTimer){cancelAnimationFrame(redPillEffectsTimer);redPillEffectsTimer=null;}
    // Reset all effects
    gridGlitchOffset=0;invertFlash=false;hexFlashCells=[];believeActive=false;prevPiecePositions=[];
    deactivateSmith();
  }
}

function bluePill(){
  bluePillActive=!bluePillActive;
  giveUpPresses=0;giveUpPressesBlue=0;giveUpPressesRed=0;
  const crt=document.getElementById('crt');
  if(bluePillActive){
    document.body.classList.add('blue-pill-active');
    launchConfetti();
    showHint('You made the best choice!');
    bluePillMsgTimer=setTimeout(()=>{
      if(bluePillActive) showHint("This is nice... why would you ever want to leave?");
    },60000);
    // Turn off red pill if active
    if(redPillActive) redPill();
    if(blackPillActive) blackPill();
  } else {
    document.body.classList.remove('blue-pill-active');
    confettiPieces=[];
    if(confettiTimer){cancelAnimationFrame(confettiTimer);confettiTimer=null;}
    if(bluePillMsgTimer){clearTimeout(bluePillMsgTimer);bluePillMsgTimer=null;}
    const cc=document.getElementById('confetti-canvas');
    cc.getContext('2d').clearRect(0,0,cc.width,cc.height);
  }
}

async function blackPill(){
  blackPillActive=!blackPillActive;
  const video=document.getElementById('webcam-feed');
  if(blackPillActive){
    // Turn off other pills
    if(redPillActive) redPill();
    if(bluePillActive) bluePill();
    try{
      webcamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
      video.srcObject=webcamStream;
      video.style.display='block';
      document.getElementById('board').style.position='relative';
      document.getElementById('board').style.zIndex='1';

      // Set up eerie mic passthrough
      blackPillAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
      blackPillMicSource=blackPillAudioCtx.createMediaStreamSource(webcamStream);
      // Delay node for ghostly echo
      const delay=blackPillAudioCtx.createDelay(1.0);
      delay.delayTime.value=0.3;
      // Feedback loop for reverb-like tail
      const feedback=blackPillAudioCtx.createGain();
      feedback.gain.value=0.4;
      // Lower volume to reduce feedback risk
      const output=blackPillAudioCtx.createGain();
      output.gain.value=0.5;

      // Connect: mic -> delay -> output -> speakers
      //          delay -> feedback -> delay (loop)
      blackPillMicSource.connect(delay);
      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(output);
      output.connect(blackPillAudioCtx.destination);
    } catch(err){
      console.error('Camera/mic access denied:',err);
      showHint('Camera access denied');
      blackPillActive=false;
      return;
    }
  } else {
    video.style.display='none';
    if(blackPillAudioCtx){
      blackPillAudioCtx.close();
      blackPillAudioCtx=null;
      blackPillMicSource=null;
    }
    if(webcamStream){
      webcamStream.getTracks().forEach(t=>t.stop());
      webcamStream=null;
    }
    video.srcObject=null;
  }
}

function launchConfetti(){
  const cc=document.getElementById('confetti-canvas');
  const cctx=cc.getContext('2d');
  const colors=['#f83048','#f8d800','#40c0f8','#38d038','#d040e8','#f87000','#ffffff'];

  // Create burst of confetti
  for(let i=0;i<120;i++){
    confettiPieces.push({
      x:cc.width/2+Math.random()*100-50,
      y:cc.height/2,
      vx:(Math.random()-0.5)*12,
      vy:-Math.random()*14-4,
      w:Math.random()*6+3,
      h:Math.random()*4+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI*2,
      rv:(Math.random()-0.5)*0.3,
      life:1,
      decay:0.003+Math.random()*0.004
    });
  }

  function animateConfetti(){
    cctx.clearRect(0,0,cc.width,cc.height);
    for(let i=confettiPieces.length-1;i>=0;i--){
      const p=confettiPieces[i];
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.25; // gravity
      p.vx*=0.99;
      p.rot+=p.rv;
      p.life-=p.decay;
      if(p.life<=0){confettiPieces.splice(i,1);continue;}
      cctx.save();
      cctx.translate(p.x,p.y);
      cctx.rotate(p.rot);
      cctx.globalAlpha=p.life;
      cctx.fillStyle=p.color;
      cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cctx.restore();
    }
    if(confettiPieces.length>0 || bluePillActive){
      // Occasional new sparkle while blue pill is active
      if(bluePillActive && Math.random()<0.15){
        confettiPieces.push({
          x:Math.random()*cc.width,
          y:-5,
          vx:(Math.random()-0.5)*2,
          vy:Math.random()*2+1,
          w:Math.random()*4+2,
          h:Math.random()*3+1,
          color:colors[Math.floor(Math.random()*colors.length)],
          rot:Math.random()*Math.PI*2,
          rv:(Math.random()-0.5)*0.2,
          life:1,
          decay:0.005+Math.random()*0.005
        });
      }
      confettiTimer=requestAnimationFrame(animateConfetti);
    }
  }
  animateConfetti();
}

// Render loop for smooth sparkle animation
(function renderLoop(){
  if(!dead&&!paused&&cur) draw();
  requestAnimationFrame(renderLoop);
})();

function scaleGame(){
  const crt=document.getElementById('crt');
  const tc=document.getElementById('touch-controls');
  crt.style.transform='';
  const crtW=crt.offsetWidth;
  const crtH=crt.offsetHeight;
  const tcH=tc.offsetHeight||0;
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  const scaleW=vw/crtW;
  const scaleH=(vh-tcH)/crtH;
  const s=Math.min(scaleW,scaleH,1);
  if(s<1){
    crt.style.transform='scale('+s+')';
    crt.style.marginBottom=-(crtH*(1-s))+'px';
  }
}
scaleGame();

//  TOUCH CONTROLS
// ═══════════════════════════════════════════════════
(function(){
  const isTouchDevice='ontouchstart' in window || navigator.maxTouchPoints>0;
  if(!isTouchDevice) return;

  document.getElementById('touch-controls').style.display='block';

  function simKey(key){
    document.dispatchEvent(new KeyboardEvent('keydown',{key:key}));
  }

  // Prevent double-tap zoom and context menus on buttons
  document.querySelectorAll('.touch-btn').forEach(btn=>{
    btn.addEventListener('contextmenu',e=>e.preventDefault());
  });

  // Simple tap buttons
  function bindTap(id,key){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();simKey(key);});
  }
  bindTap('t-rotate','ArrowUp');
  bindTap('t-drop',' ');
  bindTap('t-pause','p');
  bindTap('t-hold','Enter');
  bindTap('t-gravity','Shift');

  // Auto-repeat for directional buttons
  function bindRepeat(id,key){
    const el=document.getElementById(id);
    let timer=null;
    el.addEventListener('touchstart',e=>{
      e.preventDefault();
      simKey(key);
      timer=setInterval(()=>simKey(key),100);
    });
    el.addEventListener('touchend',()=>{if(timer){clearInterval(timer);timer=null;}});
    el.addEventListener('touchcancel',()=>{if(timer){clearInterval(timer);timer=null;}});
  }
  bindRepeat('t-left','ArrowLeft');
  bindRepeat('t-right','ArrowRight');
  bindRepeat('t-down','ArrowDown');
})();
